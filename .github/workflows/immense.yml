name: salary

on:
  push:

jobs:
  bake:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        heroine: ["resolution", "create", "steady", "inspiration", "machinery"]
        agency: ["journal", "collision", "appearance", "oar"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar xI.jar
